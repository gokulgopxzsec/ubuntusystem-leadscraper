services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: leadscraper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT: development
      PORT: 8080
      LOG_LEVEL: debug
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/leadscraper?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    environment:
      ENVIRONMENT: development
      PORT: 8081
      LOG_LEVEL: debug
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/leadscraper?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/server", "--worker"]

volumes:
  pgdata:
