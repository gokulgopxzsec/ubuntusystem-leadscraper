# Memory limits are deliberate: this stack is sized for a 2-core / 7 GB box
# that is also running a desktop. Without them Postgres and two Go processes
# will happily push the machine into swap.

x-app-env: &app-env
  ENVIRONMENT: development
  LOG_LEVEL: debug
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/leadscraper?sslmode=disable
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: dev-secret-change-in-production
  # Set these in a .env file next to this compose file; they are optional.
  API_KEY: ${API_KEY:-}
  AI_PROVIDER: ${AI_PROVIDER:-none}
  AI_API_KEY: ${AI_API_KEY:-}
  AI_MODEL: ${AI_MODEL:-gemini-2.0-flash}
  GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}

services:
  postgres:
    # pgvector, not plain postgres: semantic search needs the vector extension,
    # and the stock image does not ship it.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: leadscraper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leadscraper"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "128mb", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 192M

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      <<: *app-env
      PORT: 8080
      # The API owns migrations; the worker must not race it for the same lock.
      AUTO_MIGRATE: "true"
    volumes:
      # CSV imports are read from here, so drop files into ./data.
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  worker:
    build: .
    # ENTRYPOINT is ["/app/server"], so command supplies only the arguments.
    # The old ["/app/server", "--worker"] made argv "/app/server /app/server
    # --worker"; flag.Parse stops at the first non-flag word, so --worker was
    # never seen and this container silently booted a second API server.
    command: ["--worker"]
    environment:
      <<: *app-env
      AUTO_MIGRATE: "false"
      # Two cores, and the crawl work is network-bound rather than CPU-bound.
      WORKER_CONCURRENCY: "4"
      CRAWLER_STORE_HTML: "false"
      # A Maps scrape drives a headless browser for minutes; the 2m job timeout
      # would kill it before it produced a row.
      WORKER_COLLECT_TIMEOUT: "30m"

      # The Maps scrape runs as a sibling container, which needs three things:
      #  1. the Docker socket, mounted below;
      #  2. a work directory that exists on BOTH sides, bind-mounted below;
      #  3. the host's name for it, because `docker run -v` is resolved by the
      #     daemon on the host, not inside this container.
      GMAPS_WORK_DIR: /app/data/gmaps
      GMAPS_HOST_WORK_DIR: ${PWD}/data/gmaps
    volumes:
      - ./data:/app/data
      # Lets the worker launch the scraper as a sibling container. This grants
      # the worker control of the host's Docker daemon, which is effectively root
      # on the host: fine for a single-tenant box you own, not for shared infra.
      # Run the worker natively instead (make run-worker) if that matters to you.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Wait for the API so the schema exists before any job runs.
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
  redisdata:
