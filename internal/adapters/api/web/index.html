<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>leadscraper</title>
<style>
  :root {
    --bg:#0d0f13; --panel:#15181e; --panel-2:#1c2027; --line:#272c36; --line-2:#333a47;
    --text:#e8eaee; --muted:#868f9e; --dim:#5d6673;
    --accent:#5b8cff; --accent-dim:#2d4a8a;
    --hot:#ff5c7a; --high:#ff7a45; --med:#f0b429; --low:#6b7480; --ok:#38d39f; --danger:#f0475f;
    --r:9px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:#f6f7f9; --panel:#fff; --panel-2:#f2f4f7; --line:#e3e7ec; --line-2:#d3d9e0;
      --text:#131720; --muted:#5b6675; --dim:#8b95a3; --low:#98a2b3;
    }
  }
  * { box-sizing:border-box; margin:0; }
  body {
    background:var(--bg); color:var(--text);
    font:14px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  header {
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:11px 18px; border-bottom:1px solid var(--line); background:var(--panel);
    position:sticky; top:0; z-index:30;
  }
  .brand { font-size:15px; font-weight:650; }
  .brand em { color:var(--dim); font-style:normal; font-weight:400; font-size:12px; margin-left:5px; }
  .grow { flex:1; }
  .health { display:flex; gap:11px; font-size:12px; color:var(--muted); }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--low); display:inline-block; margin-right:5px; }
  .dot.ok { background:var(--ok); } .dot.bad { background:var(--hot); }

  button {
    background:var(--accent); color:#fff; border:0; border-radius:7px;
    padding:7px 13px; font:inherit; font-weight:550; cursor:pointer;
  }
  button:hover:not(:disabled) { filter:brightness(1.12); }
  button:disabled { opacity:.45; cursor:not-allowed; }
  button.ghost { background:transparent; color:var(--muted); border:1px solid var(--line); }
  button.ghost:hover:not(:disabled) { color:var(--text); border-color:var(--line-2); }
  button.danger { background:var(--danger); }
  button.sm { padding:4px 9px; font-size:12px; }

  main { padding:18px; max-width:1240px; margin:0 auto; }

  .tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(112px,1fr)); gap:8px; margin-bottom:14px; }
  .tile {
    background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
    padding:10px 12px; cursor:pointer;
  }
  .tile:hover { border-color:var(--accent-dim); }
  .tile.on { border-color:var(--accent); background:var(--panel-2); }
  .tile b { display:block; font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; }
  .tile span { font-size:11px; color:var(--muted); }
  .tile.hot b { color:var(--hot); } .tile.high b { color:var(--high); }

  .bar { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:12px; }
  input, select {
    background:var(--panel); color:var(--text); border:1px solid var(--line);
    border-radius:7px; padding:7px 10px; font:inherit; min-width:0;
  }
  input:focus, select:focus { outline:2px solid var(--accent); outline-offset:-1px; }
  ::placeholder { color:var(--dim); }

  .bulk {
    display:flex; align-items:center; gap:8px; padding:9px 13px; margin-bottom:10px;
    background:var(--panel-2); border:1px solid var(--accent-dim); border-radius:var(--r);
    font-size:13px;
  }
  .bulk[hidden], .banner[hidden] { display:none; }

  .banner {
    display:flex; align-items:center; gap:9px; padding:10px 14px; margin-bottom:12px;
    background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
    font-size:13px; color:var(--muted);
  }
  .banner.busy { border-color:var(--accent-dim); }
  .pulse { width:8px; height:8px; border-radius:50%; background:var(--accent);
           animation:pulse 1.3s ease-in-out infinite; flex-shrink:0; }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.15)} }

  .wrap { overflow-x:auto; border:1px solid var(--line); border-radius:var(--r); background:var(--panel); }
  table { width:100%; border-collapse:collapse; font-size:13.5px; }
  th, td { padding:10px 12px; text-align:left; border-bottom:1px solid var(--line); vertical-align:middle; }
  th {
    font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted);
    font-weight:650; white-space:nowrap; background:var(--panel-2);
  }
  th.sortable { cursor:pointer; user-select:none; }
  th.sortable:hover { color:var(--text); }
  th .arrow { opacity:.3; margin-left:3px; }
  th.sorted .arrow { opacity:1; color:var(--accent); }
  tbody tr { cursor:pointer; }
  tbody tr:hover { background:var(--panel-2); }
  tbody tr.sel { background:rgba(91,140,255,.09); }
  tbody tr:last-child td { border-bottom:0; }
  td.num { text-align:right; font-variant-numeric:tabular-nums; }
  .chk { width:34px; }
  input[type=checkbox] { width:15px; height:15px; accent-color:var(--accent); cursor:pointer; }

  .score { font-weight:700; font-size:15px; font-variant-numeric:tabular-nums; }
  .p-high { color:var(--high); } .p-hot { color:var(--hot); }
  .p-medium { color:var(--med); } .p-low { color:var(--low); }

  .nm { font-weight:600; }
  .sub { font-size:11.5px; color:var(--dim); margin-top:1px; }
  .tag {
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    padding:2px 6px; border-radius:5px; white-space:nowrap; display:inline-block;
  }
  .tag.social { background:rgba(255,92,122,.15); color:var(--hot); }
  .tag.noweb  { background:rgba(255,122,69,.15); color:var(--high); }
  .tag.dead   { background:rgba(240,71,95,.15); color:var(--danger); }
  .tag.site   { background:var(--panel-2); color:var(--dim); }

  a { color:var(--accent); }
  td a.q { color:var(--muted); text-decoration:none; }
  td a.q:hover { color:var(--accent); text-decoration:underline; }
  .acts { display:flex; gap:5px; white-space:nowrap; }
  .none { color:var(--dim); }

  .foot { display:flex; align-items:center; gap:10px; padding:11px 2px; font-size:12.5px; color:var(--muted); }

  dialog {
    background:var(--panel); color:var(--text); border:1px solid var(--line);
    border-radius:13px; padding:0; max-width:620px; width:calc(100% - 30px);
  }
  dialog::backdrop { background:rgba(0,0,0,.6); }
  .dh { padding:14px 19px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:center; }
  .db { padding:17px 19px; max-height:64vh; overflow:auto; }
  .df { padding:13px 19px; border-top:1px solid var(--line); display:flex; gap:8px; }
  .field { margin-bottom:11px; }
  .field label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .field input, .field select { width:100%; }
  .two { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .row { display:flex; gap:12px; padding:6px 0; border-bottom:1px solid var(--line); font-size:13.5px; }
  .row:last-child { border-bottom:0; }
  .row dt { color:var(--muted); width:128px; flex-shrink:0; }
  .row dd { flex:1; word-break:break-word; }
  h3 { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim); margin:16px 0 3px; }
  .hint { font-size:12px; color:var(--dim); margin-top:9px; line-height:1.5; }
  .hint b { color:var(--med); }
  code { background:var(--panel-2); padding:1px 5px; border-radius:4px; font-size:12px; }

  .empty { text-align:center; padding:56px 20px; color:var(--muted); }
  .empty h2 { font-size:16px; margin-bottom:7px; color:var(--text); }
  .empty p { max-width:400px; margin:0 auto 14px; }

  .toast {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(8px);
    background:var(--panel-2); border:1px solid var(--line-2); color:var(--text);
    padding:10px 15px; border-radius:8px; opacity:0; transition:opacity .18s, transform .18s;
    pointer-events:none; z-index:70; font-size:13px; max-width:92vw;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.err { border-color:var(--hot); }

  @media (max-width:760px) { .hide-sm { display:none; } }
</style>
</head>
<body>

<header>
  <span class="brand">leadscraper<em id="ver"></em></span>
  <span class="grow"></span>
  <span class="health">
    <span><i class="dot" id="d-db"></i>db</span>
    <span><i class="dot" id="d-redis"></i>redis</span>
  </span>
  <button class="ghost" id="btn-add">+ Add lead</button>
  <button id="btn-scrape">Find leads</button>
</header>

<main>
  <div class="banner busy" id="busy" hidden>
    <span class="pulse"></span><span id="busy-text"></span>
  </div>
  <div class="banner" id="searchbar" hidden>
    <span id="search-info"></span><span class="grow"></span>
    <button class="ghost sm" id="btn-clear">Clear search</button>
  </div>

  <div class="tiles" id="tiles"></div>

  <div class="bar">
    <input id="q" placeholder="Search leads..." style="flex:1;min-width:200px">
    <select id="f-pri">
      <option value="">All priorities</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <select id="f-web">
      <option value="">Any web presence</option>
      <option value="none">No website</option>
      <option value="social">Social only</option>
      <option value="site">Has a site</option>
    </select>
    <select id="f-cat"><option value="">All categories</option></select>
    <select id="f-src"><option value="">All sources</option></select>
    <button class="ghost" id="btn-export">Export CSV</button>
  </div>

  <div class="bulk" id="bulk" hidden>
    <b id="bulk-n"></b>
    <span class="grow"></span>
    <button class="ghost sm" id="bulk-rescan">Re-scan</button>
    <button class="danger sm" id="bulk-delete">Delete</button>
    <button class="ghost sm" id="bulk-none">Cancel</button>
  </div>

  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th class="chk"><input type="checkbox" id="chk-all"></th>
          <th class="sortable" data-sort="score">Score<span class="arrow">&#8595;</span></th>
          <th class="sortable" data-sort="name">Business<span class="arrow">&#8595;</span></th>
          <th>Web presence</th>
          <th class="hide-sm">Contact</th>
          <th class="sortable num hide-sm" data-sort="reviews">Reviews<span class="arrow">&#8595;</span></th>
          <th class="sortable num hide-sm" data-sort="rating">Rating<span class="arrow">&#8595;</span></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <div class="foot">
    <span id="count"></span>
    <span class="grow"></span>
    <button class="ghost sm" id="prev">Prev</button>
    <span id="page"></span>
    <button class="ghost sm" id="next">Next</button>
  </div>
</main>

<dialog id="dlg-detail">
  <div class="dh"><strong id="dt-name" class="grow"></strong><button class="ghost sm" data-close>Close</button></div>
  <div class="db" id="dt-body"></div>
</dialog>

<dialog id="dlg-edit">
  <div class="dh"><strong class="grow" id="ed-title">Edit lead</strong></div>
  <div class="db">
    <div class="field"><label for="ed-name">Business name *</label><input id="ed-name"></div>
    <div class="two">
      <div class="field"><label for="ed-cat">Category</label><input id="ed-cat" placeholder="bakery"></div>
      <div class="field"><label for="ed-phone">Phone</label><input id="ed-phone"></div>
    </div>
    <div class="field"><label for="ed-addr">Address</label><input id="ed-addr"></div>
    <div class="two">
      <div class="field"><label for="ed-web">Website</label><input id="ed-web" placeholder="example.in"></div>
      <div class="field"><label for="ed-rating">Rating (0&ndash;5)</label><input id="ed-rating" type="number" step="0.1" min="0" max="5"></div>
    </div>
    <p class="hint" id="ed-hint"></p>
  </div>
  <div class="df">
    <button id="ed-save">Save</button>
    <button class="ghost" data-close>Cancel</button>
  </div>
</dialog>

<dialog id="dlg-scrape">
  <div class="dh"><strong class="grow">Find leads</strong></div>
  <div class="db">
    <div class="field"><label for="s-source">Source</label><select id="s-source"></select></div>
    <div class="field" id="s-cat-f"><label for="s-cat">Business type</label><input id="s-cat" placeholder="bakery, tailor, gym..."></div>
    <div class="field" id="s-loc-f"><label for="s-loc">Location</label><input id="s-loc" placeholder="Kochi"></div>
    <div class="field" id="s-file-f" hidden><label for="s-file">CSV file (in data/)</label><input id="s-file"></div>
    <div class="field"><label for="s-limit">Max results</label><input id="s-limit" type="number" value="20" min="1" max="500"></div>
    <p class="hint" id="s-hint"></p>
  </div>
  <div class="df">
    <button id="s-go">Start</button>
    <button class="ghost" data-close>Cancel</button>
  </div>
</dialog>

<div class="toast" id="toast"></div>

<script>
'use strict';
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let apiKey = localStorage.getItem('ls_key') || '';

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (apiKey) headers['X-API-Key'] = apiKey;

  const res = await fetch('/api/v1' + path, { ...opts, headers });
  if (res.status === 401) {
    const k = prompt('This API needs a key (API_KEY in .env):');
    if (!k) throw new Error('unauthorized');
    apiKey = k;
    localStorage.setItem('ls_key', k);
    return api(path, opts);
  }
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'HTTP ' + res.status);
  return res.status === 204 ? null : res.json();
}

function toast(msg, err) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = 'toast'; }, 3800);
}

// ---------------------------------------------------------------- state

const state = {
  page: 1, limit: 50, sort: 'score', order: 'desc',
  priority: '', web: '', category: '', source: '',
};
let rows = [];
let total = 0;
const selected = new Set();
let searching = null;   // search results, when a search is active

const gap = (l, k) => (l.score && (l.score.breakdown || {})[k]) > 0;
const isSocial = (l) => gap(l, 'social_only');
const isNoWeb  = (l) => gap(l, 'no_website');
const isDead   = (l) => gap(l, 'broken_website');

const priClass = (l) => isSocial(l) ? 'p-hot' : 'p-' + (l.score ? l.score.priority : 'low');
const anyFilter = () => state.priority || state.web || state.category || state.source;
const host = (u) => { try { return new URL(u).host.replace(/^www\./, ''); } catch { return u; } };
const short = (s, n) => (s && s.length > n) ? s.slice(0, n) + '...' : (s || '');

function qs() {
  const p = new URLSearchParams();
  p.set('page', state.page);
  p.set('limit', state.limit);
  p.set('sort', state.sort);
  p.set('order', state.order);
  for (const k of ['priority', 'web', 'category', 'source']) {
    if (state[k]) p.set(k, state[k]);
  }
  return p.toString();
}

// ---------------------------------------------------------------- load

async function load() {
  // A background refresh must never wipe out search results the user is reading.
  if (searching) return;
  try {
    const r = await api('/leads?' + qs());
    rows = r.data || [];
    total = r.total || 0;
    render();
  } catch (e) {
    toast('Could not load leads: ' + e.message, true);
  }
}

async function loadStats() {
  try {
    const s = await api('/leads/stats');

    const tile = (key, kind, label, val, cls) => `
      <div class="tile ${cls || ''} ${state[kind] === key && key ? 'on' : ''}"
           data-key="${key}" data-kind="${kind}">
        <b>${val}</b><span>${label}</span>
      </div>`;

    $('tiles').innerHTML =
      tile('', 'none', 'Total leads', s.total) +
      tile('high', 'priority', 'High priority', s.high, 'high') +
      tile('social', 'web', 'Social only', s.social_only, 'hot') +
      tile('none', 'web', 'No website', s.no_website) +
      tile('medium', 'priority', 'Medium', s.medium) +
      tile('low', 'priority', 'Low', s.low) +
      (s.unscored ? tile('', 'none', 'Not scored yet', s.unscored) : '');

    // The tiles double as one-click filters; clicking the active one clears it.
    for (const t of document.querySelectorAll('.tile')) {
      t.onclick = () => {
        const { key, kind } = t.dataset;
        if (kind === 'none') { state.priority = state.web = ''; }
        else {
          const cleared = state[kind] === key;
          state.priority = state.web = '';
          if (!cleared) state[kind] = key;
        }
        $('f-pri').value = state.priority;
        $('f-web').value = state.web;
        state.page = 1;
        dropSearch();
        refresh();
      };
    }
  } catch { /* the tiles are decoration; failing them is not worth a toast */ }
}

async function loadFacets() {
  try {
    const f = await api('/leads/facets');
    $('f-cat').innerHTML = '<option value="">All categories</option>'
      + (f.categories || []).map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
    $('f-src').innerHTML = '<option value="">All sources</option>'
      + (f.sources || []).map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
    $('f-cat').value = state.category;
    $('f-src').value = state.source;
  } catch { /* leave the dropdowns as they are */ }
}

function refresh() { load(); loadStats(); }

// ---------------------------------------------------------------- render

function render() {
  const list = searching
    ? searching.results.map(h => ({ business: h.business, score: h.score, email: '' }))
    : rows;

  if (!list.length) {
    const fresh = total === 0 && !searching && !anyFilter();
    $('rows').innerHTML = `<tr><td colspan="8"><div class="empty">${
      fresh
        ? `<h2>No leads yet</h2>
           <p>Scrape Google Maps for real businesses. Try <b>bakery</b> in <b>Kochi</b>.</p>
           <button id="empty-scrape">Find leads</button>`
        : `<h2>Nothing matches</h2><p>Try clearing a filter.</p>`
    }</div></td></tr>`;

    $('empty-scrape')?.addEventListener('click', openScrape);
    $('count').textContent = '';
    $('page').textContent = '';
    return;
  }

  $('rows').innerHTML = list.map((l) => {
    const b = l.business;
    const s = l.score;
    const meta = b.metadata || {};

    let web;
    if (isSocial(l))     web = '<span class="tag social">social only</span>';
    else if (isNoWeb(l)) web = '<span class="tag noweb">no website</span>';
    else if (isDead(l))  web = '<span class="tag dead">site down</span>';
    else if (b.website)  web = `<a class="q" href="${esc(b.website)}" target="_blank" rel="noopener">${esc(host(b.website))}</a>`;
    else                 web = '<span class="tag site">unknown</span>';

    const contact = l.email || b.phone;

    return `
      <tr data-id="${esc(b.id)}" class="${selected.has(b.id) ? 'sel' : ''}">
        <td class="chk"><input type="checkbox" data-pick="${esc(b.id)}" ${selected.has(b.id) ? 'checked' : ''}></td>
        <td><span class="score ${priClass(l)}">${s ? s.total_score : '&mdash;'}</span></td>
        <td>
          <div class="nm">${esc(b.name)}</div>
          <div class="sub">${esc(b.category || '')}${b.address ? ' &middot; ' + esc(short(b.address, 40)) : ''}</div>
        </td>
        <td>${web}</td>
        <td class="hide-sm">${contact ? esc(contact) : '<span class="none">&mdash;</span>'}</td>
        <td class="num hide-sm">${meta.review_count || '<span class="none">&mdash;</span>'}</td>
        <td class="num hide-sm">${b.rating ? b.rating.toFixed(1) : '<span class="none">&mdash;</span>'}</td>
        <td><div class="acts">
          <button class="ghost sm" data-edit="${esc(b.id)}">Edit</button>
          <button class="ghost sm" data-del="${esc(b.id)}">Del</button>
        </div></td>
      </tr>`;
  }).join('');

  // A row opens the detail view, but the controls inside it must not.
  for (const tr of document.querySelectorAll('#rows tr[data-id]')) {
    tr.onclick = (e) => {
      if (e.target.closest('button, input, a')) return;
      showDetail(tr.dataset.id);
    };
  }
  for (const c of document.querySelectorAll('[data-pick]')) {
    c.onclick = (e) => { e.stopPropagation(); pick(c.dataset.pick, c.checked); };
  }
  for (const b of document.querySelectorAll('[data-edit]')) {
    b.onclick = (e) => { e.stopPropagation(); openEdit(b.dataset.edit); };
  }
  for (const b of document.querySelectorAll('[data-del]')) {
    b.onclick = (e) => { e.stopPropagation(); delOne(b.dataset.del); };
  }

  markSort();
  syncBulk();

  if (searching) {
    $('count').textContent = `${list.length} result${list.length === 1 ? '' : 's'}`;
    $('page').textContent = '';
    $('prev').disabled = $('next').disabled = true;
  } else {
    const from = (state.page - 1) * state.limit + 1;
    const to = Math.min(state.page * state.limit, total);
    $('count').textContent = `${from}–${to} of ${total}`;
    $('page').textContent = `Page ${state.page}`;
    $('prev').disabled = state.page <= 1;
    $('next').disabled = state.page * state.limit >= total;
  }
}

function markSort() {
  for (const th of document.querySelectorAll('th.sortable')) {
    const on = th.dataset.sort === state.sort;
    th.classList.toggle('sorted', on);
    th.querySelector('.arrow').innerHTML = on && state.order === 'asc' ? '&#8593;' : '&#8595;';
  }
}

// ---------------------------------------------------------------- selection

const visibleIDs = () => (searching ? searching.results.map(h => h.business.id) : rows.map(l => l.business.id));

function pick(id, on) {
  on ? selected.add(id) : selected.delete(id);
  document.querySelector(`tr[data-id="${id}"]`)?.classList.toggle('sel', on);
  syncBulk();
}

function syncBulk() {
  const n = selected.size;
  $('bulk').hidden = n === 0;
  $('bulk-n').textContent = `${n} selected`;

  const ids = visibleIDs();
  $('chk-all').checked = ids.length > 0 && ids.every(id => selected.has(id));
}

// ---------------------------------------------------------------- CRUD

let editing = null;   // business id, or null when adding

function openAdd() {
  editing = null;
  $('ed-title').textContent = 'Add a lead';
  for (const f of ['name', 'cat', 'phone', 'addr', 'web', 'rating']) $('ed-' + f).value = '';
  $('ed-hint').textContent = 'It goes through the same pipeline as a scraped lead: crawled, then scored.';
  $('dlg-edit').showModal();
}

async function openEdit(id) {
  try {
    const b = await api('/businesses/' + id);
    editing = id;
    $('ed-title').textContent = 'Edit lead';
    $('ed-name').value = b.name || '';
    $('ed-cat').value = b.category || '';
    $('ed-phone').value = b.phone || '';
    $('ed-addr').value = b.address || '';
    $('ed-web').value = b.website || '';
    $('ed-rating').value = b.rating || '';
    $('ed-hint').textContent =
      'Changing the website re-crawls and re-scores the lead, since the old score describes the old URL.';
    $('dlg-edit').showModal();
  } catch (e) {
    toast(e.message, true);
  }
}

async function save() {
  const body = {
    name: $('ed-name').value.trim(),
    category: $('ed-cat').value.trim(),
    phone: $('ed-phone').value.trim(),
    address: $('ed-addr').value.trim(),
    website: $('ed-web').value.trim(),
  };
  if (!body.name) return toast('A name is required.', true);

  const rating = parseFloat($('ed-rating').value);
  if (!Number.isNaN(rating)) body.rating = rating;

  $('ed-save').disabled = true;
  try {
    if (editing) {
      await api('/businesses/' + editing, { method: 'PATCH', body: JSON.stringify(body) });
      toast('Saved.');
    } else {
      await api('/businesses', { method: 'POST', body: JSON.stringify(body) });
      toast('Lead added. It is being crawled and scored now.');
    }
    $('dlg-edit').close();
    dropSearch();
    refresh();
    poll();
  } catch (e) {
    toast(e.message, true);
  } finally {
    $('ed-save').disabled = false;
  }
}

async function delOne(id) {
  const l = rows.find(x => x.business.id === id);
  if (!confirm(`Delete ${l ? l.business.name : 'this lead'}? This cannot be undone.`)) return;

  try {
    await api('/businesses/' + id, { method: 'DELETE' });
    selected.delete(id);
    toast('Deleted.');
    dropSearch();
    refresh();
  } catch (e) {
    toast(e.message, true);
  }
}

async function bulkDelete() {
  const ids = [...selected];
  if (!confirm(`Delete ${ids.length} lead${ids.length === 1 ? '' : 's'}? This cannot be undone.`)) return;

  try {
    const r = await api('/businesses/bulk-delete', { method: 'POST', body: JSON.stringify({ ids }) });
    selected.clear();
    toast(`Deleted ${r.deleted}.`);
    dropSearch();
    refresh();
  } catch (e) {
    toast(e.message, true);
  }
}

async function bulkRescan() {
  try {
    const r = await api('/businesses/rescan', { method: 'POST', body: JSON.stringify({ ids: [...selected] }) });
    toast(`Re-scanning ${r.queued}. Scores update as they finish.`);
    selected.clear();
    render();
    poll();
  } catch (e) {
    toast(e.message, true);
  }
}

// The export follows the current filters.
//
// It fetches and downloads a blob rather than navigating to the URL: a plain
// navigation cannot carry the X-API-Key header, so it would 401 the moment
// API_KEY is set — and putting the key in the query string instead would leak it
// into browser history and any proxy log along the way.
async function exportCSV() {
  const p = new URLSearchParams(qs());
  p.delete('page');
  p.delete('limit');

  $('btn-export').disabled = true;
  try {
    const headers = apiKey ? { 'X-API-Key': apiKey } : {};
    const res = await fetch('/api/v1/leads/export?' + p.toString(), { headers });
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = `leads-${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);

    toast('Exported the current view.');
  } catch (e) {
    toast('Export failed: ' + e.message, true);
  } finally {
    $('btn-export').disabled = false;
  }
}

// ---------------------------------------------------------------- detail

async function showDetail(id) {
  $('dt-name').textContent = 'Loading...';
  $('dt-body').innerHTML = '';
  $('dlg-detail').showModal();

  try {
    const b = await api('/businesses/' + id);
    const site = b.site;              // what the crawler found
    const meta = b.metadata || {};
    $('dt-name').textContent = b.name;

    const row = (k, v) => v ? `<div class="row"><dt>${k}</dt><dd>${v}</dd></div>` : '';
    const link = (u, t) => `<a href="${esc(u)}" target="_blank" rel="noopener">${esc(t || u)}</a>`;
    let h = '';

    h += row('Category', esc(b.category));
    h += row('Address', esc(b.address));
    h += row('Phone', esc(b.phone));
    h += row('Rating', b.rating
      ? `${b.rating.toFixed(1)} &#9733;${meta.review_count ? ` (${meta.review_count} reviews)` : ''}` : '');
    h += row('Website', b.website ? link(b.website) : '<span class="none">none</span>');
    if (meta.maps_url) h += row('Google Maps', link(meta.maps_url, 'view listing'));
    h += row('Source', esc(b.source));

    if (b.score) {
      h += '<h3>Score</h3>';
      h += row('Total', `<b style="font-size:16px">${b.score.total_score}</b> &nbsp;${esc(b.score.priority)}`);
      h += row('Pitch', esc(b.score.sales_suggestion).replace(/\n/g, '<br>'));

      const gaps = Object.entries(b.score.breakdown || {})
        .filter(([, v]) => v > 0)
        .sort((a, c) => c[1] - a[1])
        .map(([k, v]) => `${esc(k.replace(/_/g, ' '))} <b>+${v}</b>`)
        .join('<br>');
      h += row('Gaps', gaps);
    }

    if (site && site.url) {
      h += '<h3>Crawl</h3>';
      h += row('Status', site.status_code || '<span style="color:var(--danger)">unreachable</span>');
      h += row('Load time', site.load_time_ms ? site.load_time_ms + ' ms' : '');
      h += row('HTTPS', site.has_ssl ? 'yes' : 'no');
      h += row('Mobile friendly', site.is_mobile_friendly ? 'yes' : 'no');
      h += row('Booking / checkout', site.has_booking ? 'yes' : 'no');
    }

    if (b.contacts?.length) {
      h += '<h3>Contacts</h3>';
      for (const c of b.contacts) {
        h += row(esc(c.contact_type || 'contact'), esc(c.email || c.whatsapp || c.phone));
      }
    }
    if (b.socials?.length) {
      h += '<h3>Social</h3>';
      for (const s of b.socials) h += row(esc(s.platform), link(s.url, host(s.url)));
    }
    if (b.audit) {
      h += '<h3>AI audit</h3>';
      h += row('Scores', `quality ${b.audit.quality_score}/10 &middot; SEO ${b.audit.seo_score}/10 &middot; mobile ${b.audit.mobile_score}/10`);
      h += row('Summary', esc(b.audit.summary));
    }

    $('dt-body').innerHTML = h;
  } catch (e) {
    $('dt-body').innerHTML = `<p class="none">Could not load: ${esc(e.message)}</p>`;
  }
}

// ---------------------------------------------------------------- search

async function runSearch() {
  const query = $('q').value.trim();
  if (!query) return clearSearch();

  try {
    const r = await api('/search', {
      method: 'POST',
      body: JSON.stringify({ query, priority: state.priority || undefined, limit: 50 }),
    });
    searching = r;
    selected.clear();

    // Semantic and keyword results are not comparable. Someone who cannot tell
    // them apart will read a keyword fallback as a weak semantic match, so say
    // which one ran, every time.
    $('search-info').innerHTML =
      `<b>${r.total}</b> ${esc(r.mode)} match${r.total === 1 ? '' : 'es'} for &ldquo;${esc(query)}&rdquo;`
      + (r.note ? ` <span class="none">&mdash; ${esc(r.note)}</span>` : '');
    $('searchbar').hidden = false;
    render();
  } catch (e) {
    toast('Search failed: ' + e.message, true);
  }
}

function dropSearch() {
  searching = null;
  $('searchbar').hidden = true;
}

function clearSearch() {
  dropSearch();
  $('q').value = '';
  refresh();
}

async function searchStatus() {
  try {
    const s = await api('/search/status');
    $('q').placeholder = s.mode === 'semantic'
      ? `Ask: bakeries with no website, tailors on Instagram... (${s.embedded_leads} embedded)`
      : 'Search by name, category or address...';
  } catch { /* the default placeholder is fine */ }
}

// ---------------------------------------------------------------- scrape

let sources = [];

async function openScrape() {
  try {
    sources = (await api('/scrape/sources')).sources || [];
    sources.sort((a) => (a === 'google_maps' ? -1 : 1));

    $('s-source').innerHTML = sources.map(s =>
      `<option value="${esc(s)}">${s === 'google_maps' ? 'Google Maps (live scrape)' : esc(s)}</option>`).join('');
    syncScrapeForm();
    $('dlg-scrape').showModal();
  } catch (e) {
    toast(e.message, true);
  }
}

function syncScrapeForm() {
  const src = $('s-source').value;
  const csv = src === 'csv';

  $('s-file-f').hidden = !csv;
  $('s-cat-f').hidden = csv;
  $('s-loc-f').hidden = csv;

  if (src === 'google_maps') {
    $('s-hint').innerHTML = 'Drives a headless browser over Google Maps. Takes a few minutes and is '
      + '<b>memory hungry</b> &mdash; close other apps on a small machine.';
  } else if (!sources.includes('google_maps')) {
    $('s-hint').innerHTML = 'The <code>google_maps</code> source is unavailable: Docker must be reachable.';
  } else {
    $('s-hint').textContent = 'Reads a CSV from the data/ directory.';
  }
}

async function runScrape() {
  const source = $('s-source').value;
  const body = { source, limit: parseInt($('s-limit').value, 10) || 20 };

  if (source === 'csv') {
    body.file = $('s-file').value.trim();
    if (!body.file) return toast('Enter a CSV filename.', true);
  } else {
    body.category = $('s-cat').value.trim();
    body.location = $('s-loc').value.trim();
    if (!body.category) return toast('Enter a business type, e.g. bakery.', true);
  }

  $('s-go').disabled = true;
  try {
    await api('/scrape', { method: 'POST', body: JSON.stringify(body) });
    $('dlg-scrape').close();
    toast('Scraping started. This can take a few minutes.');
    poll();
  } catch (e) {
    toast(e.message, true);
  } finally {
    $('s-go').disabled = false;
  }
}

// ---------------------------------------------------------------- health

let wasBusy = false;

async function poll() {
  try {
    const r = await api('/ready');
    $('ver').textContent = 'v' + r.version;
    $('d-db').className = 'dot ' + (r.checks.postgres === 'ok' ? 'ok' : 'bad');
    $('d-redis').className = 'dot ' + (r.checks.redis === 'ok' ? 'ok' : 'bad');

    const depth = r.queue_depth || 0;
    const busy = depth > 0;
    $('busy').hidden = !busy;

    if (busy) {
      $('busy-text').textContent =
        `Working... ${depth} job${depth === 1 ? '' : 's'} queued. Leads appear as they are scored.`;
      setTimeout(refresh, 2500);
    } else if (wasBusy) {
      // The queue just drained: pull the final state, and the facets may now
      // hold categories that did not exist before this scrape.
      refresh();
      loadFacets();
      searchStatus();
      toast('Done.');
    }
    wasBusy = busy;
  } catch {
    $('d-db').className = $('d-redis').className = 'dot bad';
  }
}

// ---------------------------------------------------------------- wire up

$('btn-scrape').onclick = openScrape;
$('btn-add').onclick = openAdd;
$('btn-export').onclick = exportCSV;
$('btn-clear').onclick = clearSearch;
$('ed-save').onclick = save;
$('s-go').onclick = runScrape;
$('s-source').onchange = syncScrapeForm;

$('bulk-delete').onclick = bulkDelete;
$('bulk-rescan').onclick = bulkRescan;
$('bulk-none').onclick = () => { selected.clear(); render(); };

$('chk-all').onclick = () => {
  const on = $('chk-all').checked;
  for (const id of visibleIDs()) on ? selected.add(id) : selected.delete(id);
  render();
};

$('q').onkeydown = (e) => { if (e.key === 'Enter') runSearch(); };

for (const [id, key] of [['f-pri', 'priority'], ['f-web', 'web'], ['f-cat', 'category'], ['f-src', 'source']]) {
  $(id).onchange = () => {
    state[key] = $(id).value;
    state.page = 1;
    dropSearch();
    refresh();
  };
}

for (const th of document.querySelectorAll('th.sortable')) {
  th.onclick = () => {
    const col = th.dataset.sort;
    // Clicking the active column flips direction; a new column starts descending,
    // which is what you want for a score.
    if (state.sort === col) state.order = state.order === 'desc' ? 'asc' : 'desc';
    else { state.sort = col; state.order = 'desc'; }
    state.page = 1;
    load();
  };
}

$('prev').onclick = () => { if (state.page > 1) { state.page--; load(); } };
$('next').onclick = () => { if (state.page * state.limit < total) { state.page++; load(); } };

for (const b of document.querySelectorAll('[data-close]')) {
  b.onclick = (e) => e.target.closest('dialog').close();
}

loadFacets();
refresh();
poll();
searchStatus();
setInterval(poll, 4000);
</script>
</body>
