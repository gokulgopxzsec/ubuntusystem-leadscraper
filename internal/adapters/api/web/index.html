<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>leadscraper</title>
<style>
  :root {
    --bg:#0d0f13; --panel:#15181e; --panel-2:#1c2027; --line:#272c36;
    --text:#e8eaee; --muted:#868f9e; --dim:#5d6673;
    --accent:#5b8cff; --accent-dim:#2d4a8a;
    --hot:#ff5c7a; --high:#ff7a45; --med:#f0b429; --low:#5d6673; --ok:#38d39f;
    --radius:10px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:#f7f8fa; --panel:#fff; --panel-2:#f1f3f6; --line:#e2e6ec;
      --text:#131720; --muted:#5f6b7a; --dim:#8a94a3; --low:#98a2b3;
    }
  }
  * { box-sizing:border-box; margin:0; }
  body {
    background:var(--bg); color:var(--text); font:14px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- header ---------- */
  header {
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:12px 20px; border-bottom:1px solid var(--line); background:var(--panel);
    position:sticky; top:0; z-index:20;
  }
  .brand { font-size:15px; font-weight:650; letter-spacing:-.01em; }
  .brand em { color:var(--dim); font-style:normal; font-weight:400; font-size:12px; margin-left:5px; }
  .spacer { flex:1; }
  .health { display:flex; gap:12px; align-items:center; font-size:12px; color:var(--muted); }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--low); display:inline-block; margin-right:5px; vertical-align:middle; }
  .dot.ok { background:var(--ok); }
  .dot.bad { background:var(--hot); }

  button {
    background:var(--accent); color:#fff; border:0; border-radius:7px;
    padding:8px 14px; font:inherit; font-weight:550; cursor:pointer; transition:filter .12s;
  }
  button:hover:not(:disabled) { filter:brightness(1.12); }
  button:disabled { opacity:.45; cursor:not-allowed; }
  button.ghost { background:transparent; color:var(--muted); border:1px solid var(--line); }
  button.ghost:hover { color:var(--text); border-color:var(--dim); }

  /* ---------- layout ---------- */
  main { padding:20px; max-width:1080px; margin:0 auto; }

  .bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  input, select {
    background:var(--panel); color:var(--text); border:1px solid var(--line);
    border-radius:7px; padding:8px 11px; font:inherit; min-width:0;
  }
  input:focus, select:focus { outline:2px solid var(--accent); outline-offset:-1px; }
  ::placeholder { color:var(--dim); }

  .stats { display:flex; gap:18px; margin-bottom:16px; font-size:12px; color:var(--muted); flex-wrap:wrap; }
  .stats b { color:var(--text); font-size:15px; font-weight:650; margin-right:4px; font-variant-numeric:tabular-nums; }

  /* ---------- lead card ---------- */
  .card {
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px; margin-bottom:8px; cursor:pointer;
    display:grid; grid-template-columns:52px 1fr; gap:14px; align-items:start;
    transition:border-color .12s, transform .06s;
  }
  .card:hover { border-color:var(--accent-dim); }
  .card:active { transform:scale(.998); }

  .rank { text-align:center; padding-top:2px; }
  .score {
    font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1.1;
  }
  .score.p-high { color:var(--high); }
  .score.p-hot { color:var(--hot); }
  .score.p-medium { color:var(--med); }
  .score.p-low { color:var(--low); }
  .plabel { font-size:9px; text-transform:uppercase; letter-spacing:.07em; color:var(--dim); font-weight:700; margin-top:2px; }

  .head { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .name { font-weight:650; font-size:15px; }
  .cat { font-size:12px; color:var(--dim); }
  .tag {
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
    padding:2px 7px; border-radius:20px; white-space:nowrap;
  }
  .tag.social { background:rgba(255,92,122,.14); color:var(--hot); border:1px solid rgba(255,92,122,.3); }
  .tag.noweb  { background:rgba(255,122,69,.14); color:var(--high); border:1px solid rgba(255,122,69,.3); }

  .sub { font-size:12px; color:var(--muted); margin-top:3px; display:flex; gap:12px; flex-wrap:wrap; }
  .sub a { color:var(--muted); text-decoration:none; }
  .sub a:hover { color:var(--accent); text-decoration:underline; }

  .pitch { margin-top:8px; color:var(--text); opacity:.92; font-size:13.5px; }

  .gaps { margin-top:9px; display:flex; gap:5px; flex-wrap:wrap; }
  .gap {
    font-size:11px; background:var(--panel-2); border:1px solid var(--line);
    color:var(--muted); padding:2px 8px; border-radius:20px; white-space:nowrap;
  }
  .gap b { color:var(--text); font-weight:600; }

  /* ---------- dialogs ---------- */
  dialog {
    background:var(--panel); color:var(--text); border:1px solid var(--line);
    border-radius:14px; padding:0; max-width:600px; width:calc(100% - 32px);
  }
  dialog::backdrop { background:rgba(0,0,0,.6); backdrop-filter:blur(2px); }
  .dhead { padding:15px 20px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:center; }
  .dhead strong { font-size:15px; }
  .dbody { padding:18px 20px; max-height:66vh; overflow:auto; }
  .dfoot { padding:14px 20px; border-top:1px solid var(--line); display:flex; gap:8px; }

  .row { display:flex; gap:12px; padding:7px 0; border-bottom:1px solid var(--line); font-size:13.5px; }
  .row:last-child { border-bottom:0; }
  .row dt { color:var(--muted); width:132px; flex-shrink:0; }
  .row dd { flex:1; word-break:break-word; }
  .row dd a { color:var(--accent); }
  h3 { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); margin:18px 0 4px; font-weight:700; }
  code { background:var(--panel-2); padding:1px 5px; border-radius:4px; font-size:12px; }

  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12px; color:var(--muted); margin-bottom:5px; }
  .field input, .field select { width:100%; }
  .hint { font-size:12px; color:var(--dim); margin-top:10px; line-height:1.5; }
  .hint b { color:var(--med); }

  /* ---------- states ---------- */
  .empty { text-align:center; padding:64px 20px; color:var(--muted); }
  .empty h2 { font-size:17px; margin-bottom:8px; color:var(--text); font-weight:600; }
  .empty p { max-width:420px; margin:0 auto 16px; }

  .toast {
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(8px);
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:10px 16px; border-radius:8px; opacity:0; transition:opacity .2s, transform .2s;
    pointer-events:none; z-index:60; font-size:13px; max-width:90vw;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.err { border-color:var(--hot); }

  .working {
    display:flex; align-items:center; gap:9px; padding:11px 15px; margin-bottom:14px;
    background:var(--panel); border:1px solid var(--accent-dim); border-radius:var(--radius);
    font-size:13px; color:var(--muted);
  }
  .working[hidden] { display:none; }
  .pulse { width:8px; height:8px; border-radius:50%; background:var(--accent); animation:pulse 1.3s ease-in-out infinite; flex-shrink:0; }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.15)} }

  @media (max-width:560px) {
    .card { grid-template-columns:44px 1fr; gap:10px; padding:12px; }
    .row { flex-direction:column; gap:2px; }
    .row dt { width:auto; }
  }
</style>
</head>
<body>

<header>
  <span class="brand">leadscraper<em id="ver"></em></span>
  <span class="spacer"></span>
  <span class="health">
    <span><i class="dot" id="d-db"></i>db</span>
    <span><i class="dot" id="d-redis"></i>redis</span>
  </span>
  <button id="btn-scrape">Find leads</button>
</header>

<main>
  <div class="working" id="working" hidden>
    <span class="pulse"></span>
    <span id="working-text">Scraping Google Maps...</span>
  </div>

  <div class="stats" id="stats"></div>

  <div class="bar">
    <input id="q" placeholder="Search by name..." style="flex:1;min-width:180px">
    <select id="f-pri">
      <option value="">All priorities</option>
      <option value="high">High only</option>
      <option value="medium">Medium only</option>
    </select>
    <select id="f-web">
      <option value="">Any web presence</option>
      <option value="none">No website</option>
      <option value="social">Social only</option>
      <option value="site">Has a real site</option>
    </select>
    <button class="ghost" id="btn-refresh">Refresh</button>
  </div>

  <div id="list"></div>
</main>

<dialog id="dlg-detail">
  <div class="dhead"><strong id="dt-name" class="spacer"></strong><button class="ghost" data-close>Close</button></div>
  <div class="dbody" id="dt-body"></div>
</dialog>

<dialog id="dlg-scrape">
  <div class="dhead"><strong class="spacer">Find leads</strong></div>
  <div class="dbody">
    <div class="field">
      <label for="s-source">Source</label>
      <select id="s-source"></select>
    </div>
    <div class="field">
      <label for="s-cat">Business type</label>
      <input id="s-cat" placeholder="bakery, tailor, gym, boutique...">
    </div>
    <div class="field">
      <label for="s-loc">Location</label>
      <input id="s-loc" placeholder="Kochi">
    </div>
    <div class="field" id="s-file-field" hidden>
      <label for="s-file">CSV file (inside data/)</label>
      <input id="s-file" placeholder="my-leads.csv">
    </div>
    <div class="field">
      <label for="s-limit">Max results</label>
      <input id="s-limit" type="number" value="20" min="1" max="500">
    </div>
    <p class="hint" id="s-hint"></p>
  </div>
  <div class="dfoot">
    <button id="s-go">Start scraping</button>
    <button class="ghost" data-close>Cancel</button>
  </div>
</dialog>

<div class="toast" id="toast"></div>

<script>
'use strict';
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let apiKey = localStorage.getItem('ls_key') || '';

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (apiKey) headers['X-API-Key'] = apiKey;

  const res = await fetch('/api/v1' + path, { ...opts, headers });

  if (res.status === 401) {
    const key = prompt('This API needs a key (API_KEY in .env):');
    if (!key) throw new Error('unauthorized');
    apiKey = key;
    localStorage.setItem('ls_key', key);
    return api(path, opts);
  }
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'HTTP ' + res.status);
  return res.status === 204 ? null : res.json();
}

function toast(msg, isErr) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = 'toast'; }, 4000);
}

// ---------------------------------------------------------------- model

let leads = [];
let sources = [];

// A business whose only web presence is an Instagram page is the single best
// lead there is, so it gets its own visual treatment rather than being buried
// among the generic gaps.
const isSocial = (l) => (l.breakdown || {}).social_only > 0;
const isNoWeb  = (l) => (l.breakdown || {}).no_website > 0;

function priorityClass(l) {
  if (isSocial(l)) return 'p-hot';
  return 'p-' + l.priority;
}

// ---------------------------------------------------------------- health

let wasBusy = false;

async function poll() {
  try {
    const r = await api('/ready');
    $('ver').textContent = 'v' + r.version;
    $('d-db').className = 'dot ' + (r.checks.postgres === 'ok' ? 'ok' : 'bad');
    $('d-redis').className = 'dot ' + (r.checks.redis === 'ok' ? 'ok' : 'bad');

    const busy = (r.queue_depth || 0) > 0;
    $('working').hidden = !busy;

    if (busy) {
      $('working-text').textContent =
        `Working... ${r.queue_depth} job${r.queue_depth === 1 ? '' : 's'} in the queue. `
        + `Leads appear here as they are scored.`;
      // Refresh often enough to feel live while the worker is chewing.
      setTimeout(load, 2500);
    } else if (wasBusy) {
      // The queue just drained: pull the final state once.
      load();
      toast('Done.');
    }
    wasBusy = busy;
  } catch {
    $('d-db').className = $('d-redis').className = 'dot bad';
  }
}

// ---------------------------------------------------------------- leads

async function load() {
  try {
    leads = (await api('/leads?limit=200')).data || [];
    render();
  } catch (e) {
    toast('Could not load leads: ' + e.message, true);
  }
}

function filtered() {
  const q = $('q').value.trim().toLowerCase();
  const fp = $('f-pri').value;
  const fw = $('f-web').value;

  return leads.filter((l) => {
    const b = l.business || {};
    if (q && !(b.name || '').toLowerCase().includes(q)) return false;
    if (fp && l.priority !== fp) return false;
    if (fw === 'none'   && !isNoWeb(l)) return false;
    if (fw === 'social' && !isSocial(l)) return false;
    if (fw === 'site'   && (isNoWeb(l) || isSocial(l))) return false;
    return true;
  });
}

function render() {
  const rows = filtered();

  const social = leads.filter(isSocial).length;
  const noweb = leads.filter(isNoWeb).length;
  $('stats').innerHTML = leads.length ? `
    <span><b>${leads.length}</b>leads</span>
    <span><b>${leads.filter(l => l.priority === 'high').length}</b>high priority</span>
    <span><b>${noweb}</b>no website</span>
    <span><b>${social}</b>selling on social only</span>` : '';

  if (!rows.length) {
    $('list').innerHTML = leads.length
      ? `<div class="empty"><h2>Nothing matches that filter</h2></div>`
      : `<div class="empty">
           <h2>No leads yet</h2>
           <p>Scrape Google Maps for real businesses. Try <b>bakery</b> in <b>Kochi</b> &mdash;
              you will get shops with no website, and shops selling entirely through Instagram.</p>
           <button onclick="openScrape()">Find leads</button>
         </div>`;
    return;
  }

  $('list').innerHTML = rows.map((l) => {
    const b = l.business || {};
    const meta = b.metadata || {};

    const gaps = Object.entries(l.breakdown || {})
      .filter(([, v]) => v > 0)
      .sort((a, c) => c[1] - a[1])
      .map(([k, v]) => `<span class="gap">${esc(k.replace(/_/g, ' '))} <b>+${v}</b></span>`)
      .join('');

    let tag = '';
    if (isSocial(l)) tag = `<span class="tag social">social only</span>`;
    else if (isNoWeb(l)) tag = `<span class="tag noweb">no website</span>`;

    const bits = [];
    if (b.phone) bits.push(esc(b.phone));
    if (b.website) {
      bits.push(`<a href="${esc(b.website)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(shortUrl(b.website))}</a>`);
    }
    if (meta.review_count) bits.push(`${meta.review_count} reviews`);
    if (b.rating) bits.push(`${b.rating.toFixed(1)}&#9733;`);

    return `
      <div class="card" data-id="${esc(b.id)}">
        <div class="rank">
          <div class="score ${priorityClass(l)}">${l.total_score}</div>
          <div class="plabel">${esc(l.priority)}</div>
        </div>
        <div>
          <div class="head">
            <span class="name">${esc(b.name)}</span>
            <span class="cat">${esc(b.category || '')}</span>
            ${tag}
          </div>
          <div class="sub">${bits.join('<span style="color:var(--line)">&middot;</span>')}</div>
          <div class="pitch">${esc(l.sales_suggestion)}</div>
          <div class="gaps">${gaps}</div>
        </div>
      </div>`;
  }).join('');

  for (const c of document.querySelectorAll('.card')) {
    c.onclick = () => showDetail(c.dataset.id);
  }
}

function shortUrl(u) {
  try {
    const p = new URL(u);
    return p.host.replace(/^www\./, '') + (p.pathname !== '/' ? p.pathname.slice(0, 18) : '');
  } catch { return u; }
}

// ---------------------------------------------------------------- detail

async function showDetail(id) {
  $('dt-name').textContent = 'Loading...';
  $('dt-body').innerHTML = '';
  $('dlg-detail').showModal();

  try {
    const b = await api('/businesses/' + id);
    const meta = b.metadata || {};
    // `website` is the URL string; `site` is what the crawler actually found.
    const site = b.site;

    $('dt-name').textContent = b.name;

    const row = (k, v) => v ? `<div class="row"><dt>${k}</dt><dd>${v}</dd></div>` : '';
    const link = (u, label) => `<a href="${esc(u)}" target="_blank" rel="noopener">${esc(label || u)}</a>`;
    let h = '';

    h += row('Category', esc(b.category));
    h += row('Address', esc(b.address));
    h += row('Phone', esc(b.phone));
    h += row('Rating', b.rating ? `${b.rating.toFixed(1)} &#9733; ${meta.review_count ? `(${meta.review_count} reviews)` : ''}` : '');
    h += row('Website', b.website ? link(b.website) : '<span style="color:var(--dim)">none</span>');
    if (meta.maps_url) h += row('Google Maps', link(meta.maps_url, 'view listing'));
    h += row('Source', esc(b.source));

    if (b.score) {
      h += '<h3>Lead score</h3>';
      h += row('Score', `<b style="font-size:16px">${b.score.total_score}</b> &nbsp;${esc(b.score.priority)}`);
      h += row('Pitch', esc(b.score.sales_suggestion).replace(/\n/g, '<br>'));
    }

    if (site && site.url) {
      h += '<h3>Site crawl</h3>';
      h += row('Status', site.status_code || '<span style="color:var(--hot)">unreachable</span>');
      h += row('Load time', site.load_time_ms ? site.load_time_ms + ' ms' : '');
      h += row('HTTPS', site.has_ssl ? 'yes' : 'no');
      h += row('Mobile friendly', site.is_mobile_friendly ? 'yes' : 'no');
      h += row('Booking / checkout', site.has_booking ? 'yes' : 'no');
      h += row('Title', esc(site.title));
    }

    if (b.contacts?.length) {
      h += '<h3>Contacts</h3>';
      for (const c of b.contacts) {
        const v = c.email || c.whatsapp || c.phone;
        h += row(esc(c.contact_type || 'contact'),
          `${esc(v)} <span style="color:var(--dim);font-size:12px">${Math.round((c.confidence || 0) * 100)}%</span>`);
      }
    }

    if (b.socials?.length) {
      h += '<h3>Social</h3>';
      for (const s of b.socials) h += row(esc(s.platform), link(s.url, shortUrl(s.url)));
    }

    if (b.audit) {
      h += '<h3>AI audit</h3>';
      h += row('Scores', `quality ${b.audit.quality_score}/10 &middot; SEO ${b.audit.seo_score}/10 &middot; mobile ${b.audit.mobile_score}/10`);
      h += row('Summary', esc(b.audit.summary));
      if (b.audit.issues?.length) h += row('Issues', b.audit.issues.map(esc).join('<br>'));
      if (b.audit.services_to_offer?.length) h += row('Pitch', b.audit.services_to_offer.map(esc).join(', '));
    }

    $('dt-body').innerHTML = h;
  } catch (e) {
    $('dt-body').innerHTML = `<p style="color:var(--muted)">Could not load: ${esc(e.message)}</p>`;
  }
}

// ---------------------------------------------------------------- scrape

async function openScrape() {
  try {
    sources = (await api('/scrape/sources')).sources || [];

    // google_maps is the one that finds real businesses, so it leads.
    sources.sort((a) => (a === 'google_maps' ? -1 : 1));
    $('s-source').innerHTML = sources.map(s =>
      `<option value="${esc(s)}">${s === 'google_maps' ? 'Google Maps (live scrape)' : esc(s)}</option>`).join('');

    syncForm();
    $('dlg-scrape').showModal();
  } catch (e) {
    toast('Could not load sources: ' + e.message, true);
  }
}

function syncForm() {
  const src = $('s-source').value;
  const isCSV = src === 'csv';

  $('s-file-field').hidden = !isCSV;
  $('s-cat').parentElement.hidden = isCSV;
  $('s-loc').parentElement.hidden = isCSV;

  if (src === 'google_maps') {
    // The headless browser is the heaviest thing this project runs, and the
    // person clicking the button deserves to know before they wait.
    $('s-hint').innerHTML =
      'Drives a headless browser over Google Maps. It takes a few minutes and is '
      + '<b>memory hungry</b> &mdash; close other apps on a small machine.';
  } else if (!sources.includes('google_maps')) {
    $('s-hint').innerHTML =
      'The <code>google_maps</code> source is not available. Check the API log: Docker must be reachable.';
  } else {
    $('s-hint').textContent = 'Reads a CSV from the data/ directory.';
  }
}

async function runScrape() {
  const source = $('s-source').value;
  const body = { source, limit: parseInt($('s-limit').value, 10) || 20 };

  if (source === 'csv') {
    body.file = $('s-file').value.trim();
    if (!body.file) return toast('Enter a CSV filename.', true);
  } else {
    body.category = $('s-cat').value.trim();
    body.location = $('s-loc').value.trim();
    if (!body.category) return toast('Enter a business type, e.g. bakery.', true);
  }

  $('s-go').disabled = true;
  try {
    await api('/scrape', { method: 'POST', body: JSON.stringify(body) });
    $('dlg-scrape').close();
    toast('Scraping started. This can take a few minutes.');
    poll();
  } catch (e) {
    toast(e.message, true);
  } finally {
    $('s-go').disabled = false;
  }
}

// ---------------------------------------------------------------- wire up

$('btn-scrape').onclick = openScrape;
$('btn-refresh').onclick = () => { load(); poll(); };
$('s-go').onclick = runScrape;
$('s-source').onchange = syncForm;
$('q').oninput = render;
$('f-pri').onchange = render;
